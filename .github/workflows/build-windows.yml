# ----------------------------------------------------------------------------
# Module Description
# ------------------
#
# - This workflow is triggered only manually (workflow_dispatch).
# - Uses jcs090218/setup-emacs which supports Linux, macOS, and Windows.
# - Compilation step uses bash (Git Bash) so GNU Make POSIX shell recipes work.

# This is currently not doing much, only compile the Emacs Lisp code to check
# if that compiles in a Windows environment.
# ----------------------------------------------------------------------------
# Dependencies
# ------------
#

# ----------------------------------------------------------------------------
# Code
# ----
#
#

name: Build (Windows)

on:
  workflow_dispatch:
  push:
    branches:
      - main # Run only on 'push' for the main branch.
    paths-ignore:
      - '**.yml'
      - '**.pdf'
      - '**.rst'
      - '.gitignore'
  pull_request:
    branches:
      - '**' # Run 'pull-request' for all branches.
    paths-ignore:
      - '**.yml'
      - '**.pdf'
      - '**.rst'
      - '.gitignore'


jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '28.1'
          - '29.4'
          - '30.1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Emacs ${{ matrix.emacs_version }}
        uses: jcs090218/setup-emacs@ffd830bca5865932d99c3d179263d8b0ebdd00c0 # v3
        with:
          version: ${{ matrix.emacs_version }}

      - name: Verify Emacs
        shell: bash
        run: emacs --version

      - name: Compile
        shell: bash
        run: make all


# ----------------------------------------------------------------------------
